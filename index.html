const SECTIONS=[
{id:"intro",title:"Introduction",icon:"👁",color:"#E8453C",cards:[
  {q:"What is the difference between 'looking' and 'seeing' according to Sturken and Cartwright?",
   shortA:"'Seeing' is an automatic sensory process. 'Looking' is a conscious, culturally learned practice of making meaning — treated as a social practice.",
   a:"According to Practices of Looking by Sturken & Cartwright:\n\n\"Seeing\" is a largely automatic sensory process.\n\n\"Looking\" is a conscious, culturally learned practice of making meaning. Looking is treated as a social practice.\n\nThe term \"visuality\" is used to name historically specific ways of organizing vision.\n\nThe professor also referenced Memo Akten's work: \"We see things not as they are, but as we are\" — we filter the world through what we already know."},
  {q:"Define the term 'affordance' as it relates to digital media.",
   shortA:"The 'actionable possibilities' an environment offers; coined by James J. Gibson. Affordances depend on the relationship between the environment and the human.",
   a:"Psychologist James J. Gibson (1904–1979) coined the word \"affordance\" to describe the \"actionable possibilities\" in an environment — the environment providing the opportunity for action.\n\nAffordances depend upon the relationship between the environment and the human.\n\nWe are constantly expanding the affordances of digital environments and tools. Prof. Demirjian: \"Think about how you can take advantage of the affordances of digital media to extend your creative vision.\""},
  {q:"What is meant by the term 'speculative fictions'?",
   shortA:"Non-mimetic genres that construct models of reality rather than transcribe it — thought experiments embracing an open-ended vision of what could one day be.",
   a:"Two definitions from the lecture:\n\n1. \"A fuzzy super-set category that houses all non-mimetic genres — genres that depart from imitating conscious reality. These genres construct models of reality rather than transcribe it directly and can be understood as a thought experiment that embraces an open-ended vision of the real.\" — Marek Oziewicz\n\n2. \"Speculative futures are design approaches that help us visualize new and potential worlds, moving us beyond what currently exists into what could one day be.\" — Johanna Hoffman\n\nAlso: \"Speculation is a form of resistance, an act of hope, and an appeal to all that has been left out of the record.\" — Carlota Ortiz Monasterio"},
  {q:"How does Nora Al-Badri use speculative fictions in her work?",
   shortA:"She uses speculative fiction and AI to question ownership of cultural artifacts, challenging who controls historical heritage through works like The Post-Truth Museum (2021–2023).",
   a:"Nora Al-Badri's The Post-Truth Museum (2021–2023) uses speculative fiction to question ownership and access to cultural heritage and museum artifacts.\n\nHer work interrogates the museum as a process and as an interrogative project, challenging who controls historical artifacts. She uses AI and digital technologies to reanimate masks and artifacts, questioning truth and representation in museum contexts."},
  {q:"How does Cannupa Hanska Luger use speculative fictions?",
   shortA:"He creates science-fiction installations imagining a post-capitalist, post-colonial future where humans restore bonds with the earth — e.g., We Survive You (2021).",
   a:"Luger creates speculative fiction installations like We Survive You (2021) and Midéegaadi (Times Square, 2025).\n\nWe Survive You presents an undetermined future where a small family sets up camp. Features a Repurposed Archaic Technology vehicle (RAT Rod) powered by photosynthesis and a Transportable Intergenerational Protection Infrastructure (TIPI).\n\nThrough this science-fiction motivated installation, Luger challenges our collective thinking, imagining a post-capitalism, post-colonial future where humans restore their bonds with the earth and each other.\n\nProf. Demirjian: Artists and media makers \"prototype new possibilities that lay the pathway for how to be in the world. We are critical world builders.\""}
]},
{id:"photography",title:"Photography",icon:"📷",color:"#2D7DD2",cards:[
  {q:"What is a camera obscura and how does it relate to a digital camera?",
   shortA:"A darkened box with a small hole that projects an inverted image. The principle — light entering through a lens to form an image on a surface — is the same as a modern digital camera.",
   a:"A camera obscura is a darkened room or box with a small hole that projects an inverted image onto the opposite wall. The class discussed Abelardo Morell's photographs made inside camera obscuras.\n\nThe Sony Alpha 3000 used in class is a mirrorless camera using a live view of the camera sensor, but the concept of focal length is the same — light enters through a lens and hits a sensor to record an image."},
  {q:"Explain focal length.",
   shortA:"The optical distance from where light rays converge to the sensor, measured in mm. Longer focal length = narrower angle of view, higher magnification. Shorter = wider angle, lower magnification.",
   a:"\"Focal length, usually represented in millimeters (mm), is the basic description of a photographic lens. It is a calculation of an optical distance from the point where light rays converge to form a sharp image to the digital sensor at the focal plane.\" — Nikon\n\nThe focal length tells us the angle of view (how much is captured) and magnification (how large elements will be).\n\nLonger focal length = narrower angle, higher magnification.\nShorter focal length = wider angle, lower magnification.\n\nA prime lens has one set focal length. A zoom lens goes between focal lengths (like 40–100mm)."},
  {q:"Telephoto vs. wide-angle lens — what's the impact on the photo?",
   shortA:"Telephoto magnifies distant subjects and compresses depth. Wide-angle captures a broader field of view and exaggerates distance between near and far objects.",
   a:"Telephoto: Magnifies distant subjects, compresses depth (objects appear closer together), narrows field of view. The lecture discussed how lens selection functions thematically in The Graduate.\n\nWide-angle: Captures broad field of view, exaggerates distance between near/far objects. Gary Winogrand shot with a Leica M4 and 28mm wide-angle to capture the energy of street scenes."},
  {q:"Explain aperture, f-stop, and depth of field.",
   shortA:"Aperture controls how much light enters the lens (measured in f-stops). Large aperture (low f-number like f/2) = shallow depth of field. Small aperture (high f-number like f/16) = deep depth of field.",
   a:"Aperture controls how much light enters through the lens iris, measured in f-stops.\n\nLarge aperture (small f-number like f/2): Shallow depth of field, less light needed.\nSmall aperture (large f-number like f/16): Increased depth of field, more light needed.\n\nDepth of Field = area in which objects are in focus.\n• Deep DOF: small aperture like f/16 — f.64 group preferred sharp focus foreground to background.\n• Shallow DOF: open aperture like f/2 — camera close to subject with open aperture."},
  {q:"What is the difference between f/2, f/8, and f/16?",
   shortA:"f/2 = wide aperture, lots of light, very shallow depth of field. f/8 = moderate balance. f/16 = small aperture, less light, deep depth of field.",
   a:"f/2 = wide/open aperture — lots of light, very shallow depth of field.\nf/8 = moderate — good balance, often the 'sweet spot.'\nf/16 = small/closed — less light, deep depth of field.\n\nThe f.64 group was named after the smallest aperture (f/64) because they valued maximum depth of field and sharp focus throughout."},
  {q:"Explain shutter speed.",
   shortA:"Controls how long the sensor is exposed to light. Fast speeds (e.g. 1/320s) freeze action; slow speeds (e.g. 15s) create motion blur or light streaking effects.",
   a:"Shutter speed controls the duration of time the sensor is exposed to light.\n\nFast (1/320): Freezes a fraction of a second.\nSlow (15 seconds): Creates effects like light streaking (lecture example: ISO 100, f/22, 15-second exposure).\n\nFor time-lapse: set a long shutter or take pictures at intervals (e.g., one per minute over hours)."},
  {q:"What is ISO?",
   shortA:"Measures the camera sensor's sensitivity to light. Higher ISO = more sensitive but introduces grain. Lower ISO = cleaner image, less sensitivity.",
   a:"ISO measures the camera sensor's sensitivity to light. In modern cameras like the Sony Alpha 3000, film sensitivity is simulated digitally.\n\nHigher ISO = more sensitive, higher contrast, but may introduce visual grain.\nLower ISO = less sensitive, cleaner image.\n\nISO stands for International Organization for Standardization."},
  {q:"What is the difference between 72 dpi/ppi and 300 dpi/ppi?",
   shortA:"72 ppi is for screens/web. 300 dpi is for print. You cannot upsample without losing quality — always shoot at the highest resolution first.",
   a:"Resolution = density of pixels. DPI = dots per inch (print). PPI = pixels per inch (screen).\n\n72 ppi = screens/web. 300 ppi = print.\n\nBy shooting Camera Raw, you can output either. When converting 72→300 ppi, you shrink dimensions — do NOT click resample.\n\nKey rule: You can always start high and move down, but can't start low and increase without shrinking or losing quality. When you upsample you lose quality; sampling down is fine."},
  {q:"Explain the Rule of Thirds.",
   shortA:"Divide the frame into a 3×3 grid. Place key elements along the grid lines or at intersections for more dynamic compositions than simply centering.",
   a:"Divide the frame into a 3×3 grid. Place key elements along grid lines or at intersections for more dynamic compositions than centering.\n\nMultiple examples shown in lecture applied to photography."},
  {q:"Explain the Golden Section Rectangle.",
   shortA:"A rectangle with a 1:1.618 proportion. Placing focal points at its key intersections creates balanced compositions — used by Henri Cartier-Bresson.",
   a:"The Golden Section Rectangle has a proportion of 1:1.618.\n\nExperiment with placing focal points at key intersections (E1, E2, E3, E4 in the slides).\n\nHenri Cartier-Bresson's photographs were shown as examples of Golden Section composition."},
  {q:"What is a RAW file and how is JPEG different?",
   shortA:"RAW is uncompressed — all sensor data preserved, maximum editing flexibility. JPEG uses lossy compression — data is permanently lost but files are smaller and ready to share.",
   a:"RAW types: DNG (Nikon/Samsung), CR2 (Canon). Uncompressed, all sensor data preserved. Maximum editing flexibility.\n\nJPEG: Lossy compression — data permanently lost. Smaller file, ready to share.\n\nTIFF: Uncompressed (lossless) — standard for commercial printing. Excellent for archiving.\n\nKey: Lossy (JPEG) permanently loses data. Lossless (TIFF, PNG) preserves exact original."},
  {q:"Compare Pictorialism, f.64 Group, and NYC Street Photographers.",
   shortA:"Pictorialism: soft focus, painterly, atmospheric. f.64: maximum sharpness, deep depth of field. NYC Street: candid, spontaneous, wide-angle lenses capturing urban energy.",
   a:"Pictorialism (c.1885–1915): Soft focus, atmosphere, like impressionist painting. Conveying emotional states. Legitimizing photography as art. Used slightly out-of-focus lenses, gum bichromate, platinum prints. Stieglitz: \"Atmosphere softens all lines.\" Artists: Stieglitz, Steichen, Seeley.\n\nf.64 Group (1930s): Sharp focus foreground to background. Named after smallest aperture for max DOF. Shifted away from Pictorialism. Artists: Edward Weston, Sonya Noskowiak.\n\nNYC Street (mid-20th c.): Candid, spontaneous urban life. Winogrand's photos are \"tilted, skewed, unsteady\" (Geoff Dyer). Wide-angle lenses (Winogrand: Leica M4, 28mm). Artists: Winogrand, Lisette Model, Jamel Shabazz, Joel Meyerowitz."}
]},
{id:"collage",title:"Collage & Photomontage",icon:"✂️",color:"#9B59B6",cards:[
  {q:"What 19th century techniques are precursors to photomontage?",
   shortA:"Combination printing (multiple negatives), double exposure, dodging and burning, and masking — all precursors to digital compositing.",
   a:"1. Combination Printing: Image from two or more negatives. Henry Peach Robinson: When the Days Work is Done (1877), Fading Away (1877).\n\n2. Double Exposure: Releasing shutter, then without advancing film, releasing again on same paper. Spirit Photography used this for 'ghost' portraits.\n\n3. Dodging: Decrease exposure → areas appear lighter.\n   Burning: Increase exposure → areas appear darker.\n\n4. Masking: Hide portions of a layer, reveal layers below. Black reveals, white conceals."},
  {q:"What is a photomontage?",
   shortA:"A collage constructed from photographs — joining multiple images or negatives into a composite.",
   a:"Two definitions from lecture:\n\n1. Joining multiple negatives and images into a composite and photographing the results.\n\n2. \"A photomontage is a collage constructed from photographs.\" — Tate Museum"},
  {q:"Compare Berlin Dadaists (Höch, Heartfield) vs. Russian Constructivists (Rodchenko, Klutsis).",
   shortA:"Dadaists (Höch, Heartfield) used photomontage to criticize and undermine government. Constructivists (Rodchenko, Klutsis) used it to promote communist state ideology (agitprop).",
   a:"Berlin Dadaists: Post-WWI rage and disillusionment. \"Our rage had to find expression\" — Max Ernst.\n\nHöch: Worked at Ullstein Press, appropriated mass culture images of women to comment on distance between media representation and reality. Critical of marriage. \"I use [the photograph] like color, or as the poet uses the word.\"\n\nHeartfield: \"Use Photography as a Weapon.\" Anti-Nazi satire: Adolf Superman (1932), The Meaning of the Hitler Salute, Hurray the Butter is All Gone.\n\nRussian Constructivists: \"By clipping illustrations and reassembling them, they created a lively alternative to painting\" — MoMA. Industrial inspiration, new materials. Art should have social utility promoting communism. Agitprop = agitation + propaganda.\n\nKey difference: Dadaists used photomontage to undermine/criticize government; Constructivists used it to promote state ideology."},
  {q:"What is a blending mode and why use them?",
   shortA:"Applied to the top layer, blending modes create the appearance that background and foreground layers are working together, picking up each other's texture and luminance.",
   a:"Blending modes (or composite modes) are applied to the top layer of the stack. They give the appearance that background and foreground are working together — you pick up the texture of the background.\n\nLuminance = black to white grayscale range.\nChrominance = color."},
  {q:"Describe Multiply, Screen, and Overlay blending modes.",
   shortA:"Screen: lightest values shine through — result always lighter. Multiply: darkest values shine through — result always darker. Overlay: combines both, raising contrast.",
   a:"Screen: Combines based on lightest values. Whichever pixel is lighter shines through. Result always lighter.\n\nMultiply: Combines based on darkest values. Whichever pixel is darkest shines through. Result always darker.\n\nOverlay: Combines both lightest and darkest. Creates higher contrast. Pushes midtones darker than 50% darker, lighter than 50% lighter."},
  {q:"Masks vs. deleting — what's the advantage?",
   shortA:"Masks are non-destructive — they hide parts of a layer and are fully reversible and editable. Deleting is permanent and destructive.",
   a:"Masks hide portions of a layer and reveal layers below. Use grayscale on the mask: black reveals below, white conceals.\n\nMasks are non-destructive — editable, refinable, reversible. Deleting is destructive and permanent.\n\nMasking is a valuable compositing technique for combining photos or removing objects."},
  {q:"Compare Pelle Cass and Martha Rosler's photomontage.",
   shortA:"Cass composites many moments of a single scene into one dense image. Rosler juxtaposes domestic interiors with war imagery as a critique of capitalism and media culture.",
   a:"Pelle Cass (Crowded Fields, 2017): \"Still photo time lapse\" — photographs a scene over time, composites all figures into one dense image. Accumulation and energy of everyday spaces.\n\nMartha Rosler (Bringing the War Home, 1967–72; Photo Op, 2008): Juxtaposes domestic interiors with war images. \"I want to explore the relationships between individual consciousness, family life, and the culture of monopoly capitalism.\"\n\nCampany: \"Photography has been the most obvious medium through which high art has entered into dialogues with mass culture.\""},
  {q:"How do Chris Burnett and Joshua Citarella comment on contemporary times?",
   shortA:"Burnett makes editorial and commercial digital composites. Citarella creates dense layered tableaux exploring political collapse, empire, and the rampant privatization of social life.",
   a:"Burnett: Photomontages for New York Times Magazine and ads (Quibi). Editorial and commercial digital compositing.\n\nCitarella: \"Life-size photographic tableaux composed of hundreds of individual images through painstaking digital layering. This body of work explores our current political landscape; a period of collapsing empire and withering state power, brought about by the rampant privatization of social life.\"\n\nChristiane Paul: \"Digital technologies add an extra dimension... Digital collages constitute a shift from the affirmation of boundaries to their erasure.\""}
]},
{id:"design1",title:"Design Principles Pt. 1",icon:"△",color:"#27AE60",cards:[
  {q:"Define vector graphics vs. bitmap (raster) graphics.",
   shortA:"Raster graphics are pixel grids that lose quality when enlarged (JPEG, PNG). Vector graphics use mathematical paths and scale infinitely without quality loss — best for logos and icons.",
   a:"Raster graphics: Grids of pixels. File formats: JPEG, GIF, TIFF, PNG. Lose quality when enlarged.\n\nScalable Vector Graphics (SVG): Mathematical paths/points. Scale infinitely without quality loss. Best for logos, icons, illustrations."},
  {q:"What are the four primary principles of graphic design?",
   shortA:"Unity, Proportion, Hierarchy, and Variety — the four primary principles for organizing and creating meaning through visual design.",
   a:"1. Unity — Establish comprehension through formal arrangement of all parts.\n2. Proportion — Outer proportions in relation to internal divisions; size relationships establishing underlying structure.\n3. Hierarchy — Use of dominance to establish order.\n4. Variety — Create visual interest through managing contrast.\n\n\"Variety is a visual principle that provides the eye with a noticeable difference between two things.\" — Richard Poulin"},
  {q:"What are the supporting design principles?",
   shortA:"Scale, Balance, Rhythm, Repetition, Economy, and Proximity — they support and extend the four primary principles.",
   a:"Scale — Size relationship from one element to another.\nBalance — Visual distribution, symmetric or asymmetric.\nRhythm — Alternating between shape and space.\nRepetition — Pattern of movement.\nEconomy — Restraint for harmony.\nProximity — Position and spacing between elements."},
  {q:"Explain Gestalt principles of Proximity and Closure.",
   shortA:"Proximity: nearby elements are perceived as a related group. Closure: the eye automatically completes incomplete shapes where image information is missing.",
   a:"Proximity — We perceive close objects/elements as a related group.\n\nClosure — Where image information may not all be present, our eyes complete the shape for us."},
  {q:"Explain symmetry, approximate symmetry, and asymmetrical balance.",
   shortA:"Symmetry: exact mirror image on an axis. Approximate symmetry: slight differences between sides. Asymmetrical balance: sides differ in size and shape but still feel visually balanced.",
   a:"Symmetry: Mirror image on either side of an axial line; elements correspond in size, shape, placement. Examples: Taj Mahal, Wes Anderson films.\n\nApproximate symmetry (relieved symmetry): Slight differences between axial areas. Example: Luo Brothers.\n\nAsymmetrical balance: Sides don't correspond in size/shape/placement. Example: Klimt's Death and Life."},
  {q:"What are the precepts of asymmetrical balance?",
   shortA:"Large forms are visually heavier than small; dark heavier than light; textured heavier than smooth; complex heavier than simple; two small forms can balance one large one.",
   a:"A precept is a rule prescribing a course of action.\n\n• Large form is visually heavier than small\n• Dark value form heavier than light of same size\n• Textured form heavier than smooth of same size\n• Complex form heavier than simple of same size\n• Two+ small forms can balance a large one\n• Smaller dark form can balance larger light one"},
  {q:"What does 'quality of a line' refer to?",
   shortA:"A line's quality is determined by both its path and the tool used — charcoal is sketchy, a digital pen is precise, brushed ink is organic. Tone, direction, and texture all shape a line's character.",
   a:"A line is the moving path of a point. The path determines its quality and character.\n\nLine quality is also determined by the tool — charcoal's sketch quality, digital pen precision, brushed ink's organic quality.\n\nConsider: tone/emotion, direction, tool, straight/curved/thick/thin, quality (jagged/smooth/erratic), line as edge of a shape."},
  {q:"Visual implications of horizontal, vertical, and diagonal lines.",
   shortA:"Vertical lines are assertive, denoting strength and growth. Diagonal lines are most dramatic, implying action and movement. Horizontal lines create calm and stability.",
   a:"Vertical: Assertive, denote growth and strength. (Joseph Stella, Smokestacks)\n\nDiagonal: Most dramatic — imply action and movement.\n\nHorizontal: Create calm. (Richard Orient, Atlantic Ocean Spring)\n\nCurved lines also suggest movement."},
  {q:"Compare Art Nouveau and 1960s Psychedelic poster art.",
   shortA:"Both use flowing lines and feminine figures. Art Nouveau uses soft pastels and organic motifs; Psychedelic posters use intense saturation, distorted lettering, and vibrating visual environments.",
   a:"Art Nouveau: Feminine figures, organic/plant motifs, flat, fluid curving lines ('The Whiplash' — ornamental S-curve), abstract forms, decorative patterns. Artists: Behrens, Mucha.\n\nPsychedelic posters were influenced by Art Nouveau but:\n• Higher contrast, more intensely saturated colors (vs. Art Nouveau pastels)\n• Distorted lettering, often hard to read\n• Tried to emulate the visual experience of an LSD trip\n• Vibrating visual environments\n\nBoth share: flowing lines, feminine figure, edge-to-edge detailed illustration."}
]},
{id:"design2",title:"Design Principles Pt. 2",icon:"◻",color:"#F39C12",cards:[
  {q:"Geometric vs. organic shapes.",
   shortA:"Geometric shapes are regular and mathematical — circles, squares, triangles. Organic (biomorphic) shapes are irregular, freeform, and natural.",
   a:"Geometric: Primitives — circles, squares, triangles. Regular, mathematical. Example: Augusto Herbin.\n\nOrganic (biomorphic): Irregular, freeform, natural. Example: Michael Kennan.\n\nWe see convex shapes (bulging outward) as figure and concave (sloping inward) as ground."},
  {q:"What is Shape vs. Form?",
   shortA:"Shape is two-dimensional. Form is perceived as three-dimensional — it has height, width, and depth (also called mass or volume).",
   a:"Shape is a two-dimensional character.\n\nForm is perceived as three-dimensional (also called mass or volume) — it has height, width, and depth."},
  {q:"What are characteristics of Plakatstil designs?",
   shortA:"German 'poster style': bold flat colors, simplified imagery, minimal color palette, extreme contrast, no decoration, powerful messaging. Key artist: Lucien Bernhard.",
   a:"Plakatstil = German for 'poster style.' Original flat graphic style for advertising.\n\n• Bold, flat colors\n• Simplified, reduced imagery\n• Minimal color palette\n• Extreme contrast between shapes, values, intensity\n• The opposite of decoration\n• Bold and powerful message\n\nKey artist: Lucien Bernhard (1906–1914). Also: Niklaus Stoecklin."},
  {q:"Explain negative/positive space and integrated space.",
   shortA:"Positive space: area occupied by elements. Negative space: empty area around them. Integrated space: both positive and negative actively contribute to meaning.",
   a:"Positive space: Area occupied by main subjects/elements.\nNegative space: 'Empty' space around subjects.\n\nIntegrated: Both negative and positive space actively contribute to meaning. Examples: Picasso's Harlequin (1915), Multicanal logo, Kitagawa Utamaro prints."},
  {q:"Significance of the poster in visual communication.",
   shortA:"Lithography (1798) enabled mass color printing, allowing artists like Toulouse-Lautrec and Mucha to elevate the poster as art — democratizing visual culture in urban life.",
   a:"Bridging art and advertising. Lithography (1798) enabled mass color production. Artists like Chéret, Toulouse-Lautrec, Mucha elevated posters to art.\n\nPosters were integral to: urban culture, events, advertising, entertainment. Part of the democratization of art.\n\nPuerto Rican poster culture: Lorenzo Homar, Division of Community Education, Taller Alacran (Antonio Martorelli)."},
  {q:"Define typography. Describe kerning, tracking, and leading.",
   shortA:"Kerning: space between individual letters. Tracking: uniform spacing across a range of characters. Leading: vertical space between baselines of successive lines.",
   a:"Typography: \"The style, arrangement, or appearance of typeset matter.\" — Poulin. To design with type — considering typeface, size, alignment, color, spacing. Both communicative and visual.\n\nKerning: Space between individual letter forms. A kern was a small metal piece projecting over the letter's body edge.\n\nTracking: Consistent increase/decrease of space across a range of characters. Affects the whole line.\n\nLeading: Vertical space between baselines of successive lines. Named after lead strips in hand-typesetting."},
  {q:"Type classifications (serif, sans-serif, etc.).",
   shortA:"Serif: small strokes at letter ends. Sans-serif: no serifs, clean and modern. Decorative/Display: highly stylized. Script: mimics handwriting. Monospaced: equal character width.",
   a:"Serif: Small strokes at letter ends. Classic, traditional.\nSans-serif: No serifs — clean, modern. Favored by Modernists.\nDecorative/Display: Highly stylized, for headlines.\nScript: Mimics handwriting/calligraphy.\nMonospaced: Equal character width.\n\nBe prepared to visually identify these on the exam."},
  {q:"Compare Modernism and Post-Modernism in design.",
   shortA:"Modernism: grid, sans-serif type, no decoration, 'less is more,' form follows function. Post-Modernism: irony, pastiche, bright colors, no grid, form follows style.",
   a:"Modernism (International Style, peak 1920s–60s):\n• Grid structures, asymmetrical layout, sans-serif type\n• No decoration/illustration, consistency, clarity\n• \"Less is More\" — Mies van der Rohe\n• Form follows function\n• Key: Tschichold, Bauhaus, Le Corbusier, Seagram Building\n\nPost-Modernism:\n• Reaction against Modernism's 'universal' language\n• Pastiche, retro/techno motifs, disregard for grid\n• \"Form follows style, not function\" — Drucker & McVarish\n• Bright colors, no grid, irony, appropriation\n• Key: April Greiman, David Carson, Paula Scher, Weingart, Sagmeister\n\n\"Modernism rejects tradition; Post-Modernism re-engages with history through parody or irony.\""},
  {q:"What is the principle of Economy in design?",
   shortA:"Using a minimal number of elements orchestrated to create harmony and unity. 'Less is more' — good design achieved through restraint rather than abundance.",
   a:"A minimal amount of elements orchestrated to create harmony and unity. Good design achieved with restricted elements. \"Less is more\" is the mantra.\n\nExample from lecture: Just one shape (rectangle) and three colors create a powerful sense of order through clever arrangement, rhythm, grid structure, and negative space."}
]},
{id:"color",title:"Color",icon:"🎨",color:"#E74C8B",cards:[
  {q:"Additive vs. subtractive color, RGB vs. CMYK.",
   shortA:"Additive color comes from light — use RGB for screens and monitors. Subtractive color comes from pigments — use CMYK for print-based work.",
   a:"Additive: Color from light. Examples: monitors, light bulbs, sunlight. Use RGB for screen-based work.\n\nSubtractive: Pigments combine. Examples: paints, inks. Use CMYK for print-based work."},
  {q:"Define Hue, Saturation, and Value.",
   shortA:"Hue is the color name. Value is lightness/darkness (tint = white added, shade = black added). Saturation is purity/intensity — desaturated is muted; saturated is vivid.",
   a:"Hue: Name of the color (range 0–360).\n\nValue: Relative lightness or darkness. White added = tint. Black added = shade.\n\nSaturation: Relative purity/intensity (range 0–100). Desaturated = muted, dull. Saturated = lively, vivid.\n\n\"Saturated colors attract attention. Desaturated light colors = friendly; desaturated dark = formal; saturated = exciting and dynamic.\" — Poulin"},
  {q:"Warm vs. cool colors.",
   shortA:"Warm colors (reds, yellows, oranges) associate with heat and tend to advance visually. Cool colors (blues, greens) associate with sky and water and tend to recede.",
   a:"Warm: Associated with sun, heat, fire. Tend to advance visually.\n\nCool: Associated with sky, water, shade. Tend to recede.\n\nDesigners use these perceptual properties to create depth."},
  {q:"Describe the main color schemes.",
   shortA:"Monochromatic (one hue, varied value/saturation), analogous (adjacent hues), complementary (opposite hues), split complementary, triadic (three equidistant hues).",
   a:"Monochromatic: Variations of value/saturation, same hue.\n\nAnalogous: Adjacent hues on the color wheel.\n\nComplementary: Directly opposite on the wheel.\n\nSplit Complementary: Opposite + adjacent color(s).\n\nTriadic: Three equidistant on the wheel. Example: Mondrian's Trafalgar Square."},
  {q:"How do you read hexadecimal color codes?",
   shortA:"Hex codes represent RGB as #RRGGBB pairs. FF = 255. First pair is red, second green, third blue — e.g., #ff0000 is pure red, #0000ff is pure blue.",
   a:"Hex codes represent RGB in pairs: #RRGGBB.\nExample: #d18bd0 → d1=red, 8b=green, d0=blue.\n\nCalculate: first digit × 16 + second digit.\nFF = 15×16+15 = 255.\n\nThe first digit carries most weight:\n• ff0000 or e3271d → primarily red.\n\nFor the exam: roughly identify a color from its hex code."},
  {q:"How does adjacent color affect perception? (Albers)",
   shortA:"Josef Albers showed that the same color looks different depending on its surrounding colors — our perception of color is always relative to context, not absolute.",
   a:"Our perception of a color depends on adjacent colors. Josef Albers showed that \"the true color of the two central squares becomes unrecognizable, as it loses its identity.\"\n\nThe same color looks different depending on surrounding colors — this is our daily experience, not just a trick."},
  {q:"How is color culturally specific?",
   shortA:"Color meaning varies by culture — white signals mourning in India, red is bridal in China, purple signifies royalty in the West, yellow represents royalty in China.",
   a:"Royalty: Purple (Western/Egyptian), Yellow (China), Red (Rome).\nMourning: White (India), Violet (Turkey), Brown (Ethiopia), Yellow (Burma).\nBridal: Red (China), Yellow (Hindu India).\n\nColor-emotion connections: green=envy, blue=sadness, red=anger."}
]},
{id:"photoshop",title:"Photoshop",icon:"🖌",color:"#31A2F2",cards:[
  {q:"Describe the selection tools and their differences.",
   shortA:"Marquee (geometric shapes), Magic Wand (similar-color areas), Magnetic Lasso (snaps to contrast edges), Lasso (freehand), Quick Selection (intelligent auto-detection by painting).",
   a:"Marquee: Geometric selections (rectangle/ellipse).\nMagic Wand: Selects similar-color areas. Adjustable tolerance.\nMagnetic Lasso: Snaps to edges of contrast.\nLasso: Freehand drawn. Maximum control.\nQuick Selection: Paint and Photoshop auto-detects edges. Fast and intelligent."},
  {q:"Scale and rotate from center in Photoshop.",
   shortA:"Free Transform (Cmd/Ctrl+T). Hold Alt/Option to scale from center. Cursor outside the bounding box gives a curved rotate arrow. Shift+Alt for proportional scaling from center.",
   a:"Free Transform (Ctrl/Cmd + T).\nScale from center: Hold Alt/Option + drag corner.\nRotate: Cursor outside bounding box → curved arrow → drag.\nProportional from center: Shift + Alt/Option."},
  {q:".psd file vs. .jpg — what's the difference?",
   shortA:".PSD preserves all layers, masks, and effects — fully re-editable but large. .JPG flattens and applies lossy compression — layers are permanently merged and data lost.",
   a:".PSD: Photoshop's native format. Preserves all layers, masks, effects. Large, fully re-editable. Not for web.\n\n.JPG: Flattened, lossy compression. Layers merged, data permanently lost. Small, universally viewable. Can't un-flatten."},
  {q:"What is image resolution and why does it matter?",
   shortA:"The density of pixels per inch. 72 ppi for screen, 300 dpi for print. Upsampling loses quality — always create at the highest resolution you'll need first.",
   a:"Resolution = density of pixels. DPI (print), PPI (screen).\n72 ppi = screens. 300 dpi = print.\n\nAccessed via Image Tab → Image Size. When converting 72→300, do NOT resample.\n\nUpsample = lose quality. Downsample = fine.\nAlways create at highest resolution first."}
]},
{id:"web",title:"Web / HTML",icon:"</>",color:"#E67E22",cards:[
  {q:"Describe the <p> tag.",
   shortA:"Defines a paragraph — a block of text with automatic spacing above and below. The standard body text container in HTML.",
   a:"Defines a paragraph. Block of text with automatic spacing above/below. Standard body text tag. Used in HW#1 for creative statements."},
  {q:"Describe the <a href> tag.",
   shortA:"Creates a hyperlink. The href attribute specifies the destination URL — used to link between pages or to external sites.",
   a:"Creates a hyperlink. 'href' specifies the destination URL.\nUsed in class to link pages together.\nExample: <a href=\"https://example.com\">Click here</a>"},
  {q:"Describe the <img src> tag.",
   shortA:"Embeds an image. The src attribute specifies the image path or URL. Self-closing; include an alt attribute for accessibility.",
   a:"Embeds an image. 'src' specifies image path/URL. Self-closing.\nInclude 'alt' for accessibility.\nExample: <img src=\"photo.jpg\" alt=\"description\">"},
  {q:"Describe the <h1> tag.",
   shortA:"The most important heading tag. HTML has h1 (largest) through h6 (smallest) — used to establish content hierarchy.",
   a:"Most important heading. HTML has <h1> (largest) through <h6> (smallest). Used in HW#1 for your name on the index page."},
  {q:"Describe the <br> tag.",
   shortA:"Inserts a line break — moves to the next line without starting a new paragraph. Self-closing. Use for meaningful breaks like addresses or poetry, not for spacing.",
   a:"Inserts a line break — next line without new paragraph. Self-closing. Use for meaningful breaks (addresses, poetry), not spacing (use CSS)."}
]}];

let known={},currentSection=null,shuffledCards=[],cardIdx=0,flipped=false,quizQuestions=[],quizIdx=0,quizScore=0,quizSelected=false,quizTimer=null;
function shuffle(a){const b=[…a];for(let i=b.length-1;i>0;i–){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}
function totalCards(){return SECTIONS.reduce((a,s)=>a+s.cards.length,0)}
function totalKnown(){return Object.keys(known).length}
function setRing(el,pct,c){el.setAttribute(‘stroke-dashoffset’,c*(1-pct))}
function updateGlobal(){const tc=totalCards(),tk=totalKnown();document.getElementById(‘globalCount’).textContent=`${tk}/${tc}`;setRing(document.getElementById(‘globalRing’),tc>0?tk/tc:0,131.95)}
function show(id){[‘menuView’,‘cardView’,‘quizView’].forEach(v=>document.getElementById(v).classList.toggle(‘hidden’,v!==id))}
function renderMenu(){const grid=document.getElementById(‘sectionsGrid’);grid.innerHTML=’’;SECTIONS.forEach(sec=>{const sk=sec.cards.filter(c=>known[c.q]).length;const pct=sk/sec.cards.length;const r=14,circ=2*Math.PI*r;grid.innerHTML+=`<div class="section-card"><div class="section-top"><div class="section-info"><span class="section-icon">${sec.icon}</span><div><div class="section-name">${sec.title}</div><div class="section-meta">${sec.cards.length} cards · ${sk} mastered</div></div></div><svg class="progress-ring" width="36" height="36"><circle class="progress-ring__bg" cx="18" cy="18" r="${r}"/><circle class="progress-ring__fill" cx="18" cy="18" r="${r}" stroke="${sec.color}" stroke-dasharray="${circ}" stroke-dashoffset="${circ*(1-pct)}"/></svg></div><div class="section-actions"><button style="color:${sec.color}" onclick="startCards('${sec.id}')">Flashcards</button><button style="color:${sec.color}" onclick="startQuiz('${sec.id}')">Quiz</button></div></div>`});updateGlobal()}
function goMenu(){clearTimeout(quizTimer);quizSelected=false;show(‘menuView’);renderMenu()}
function startCards(secId){currentSection=SECTIONS.find(s=>s.id===secId);shuffledCards=shuffle(currentSection.cards);cardIdx=0;flipped=false;show(‘cardView’);document.getElementById(‘cardSectionLabel’).textContent=`${currentSection.icon} ${currentSection.title}`;renderCard()}
function renderCard(){const card=shuffledCards[cardIdx];document.getElementById(‘cardQuestion’).textContent=card.q;document.getElementById(‘cardAnswer’).textContent=card.a;document.getElementById(‘cardCounter’).textContent=`${cardIdx+1}/${shuffledCards.length}`;document.getElementById(‘cardFlipper’).classList.toggle(‘flipped’,flipped);document.getElementById(‘cardButtons’).classList.toggle(‘hidden’,!flipped)}
function flipCard(){flipped=!flipped;renderCard()}
function markCard(gotIt){const card=shuffledCards[cardIdx];if(gotIt)known[card.q]=true;else delete known[card.q];flipped=false;if(cardIdx+1<shuffledCards.length){cardIdx++;setTimeout(renderCard,150)}else setTimeout(goMenu,200)}

// — Fixed quiz logic: uses card.shortA directly instead of auto-parsing card.a —
function startQuiz(secId){
const sec=secId?SECTIONS.find(s=>s.id===secId):null;
const pool=sec?sec.cards:SECTIONS.flatMap(s=>s.cards);
const picked=shuffle(pool).slice(0,Math.min(10,pool.length));
quizQuestions=picked.map(card=>{
const correct=card.shortA;
const wrongPool=pool.filter(c=>c.q!==card.q&&c.shortA!==correct);
const wrongs=shuffle(wrongPool).slice(0,3).map(c=>c.shortA);
const allOpts=[correct,…wrongs];
const uniqueOpts=[…new Set(allOpts)];
// Pad if needed (rare edge case with tiny pools)
while(uniqueOpts.length<4){
const extra=pool.find(c=>!uniqueOpts.includes(c.shortA)&&c.q!==card.q);
if(extra)uniqueOpts.push(extra.shortA);else break;
}
const options=shuffle(uniqueOpts.slice(0,4));
return{q:card.q,options,correctIdx:options.indexOf(correct)};
});
quizIdx=0;quizScore=0;quizSelected=false;
show(‘quizView’);
document.getElementById(‘quizActive’).classList.remove(‘hidden’);
document.getElementById(‘quizResults’).classList.add(‘hidden’);
renderQuiz();
}
function renderQuiz(){const q=quizQuestions[quizIdx];document.getElementById(‘quizCounter’).textContent=`${quizIdx+1}/${quizQuestions.length}`;document.getElementById(‘quizQuestion’).textContent=q.q;const c=document.getElementById(‘quizOptions’);c.innerHTML=’’;q.options.forEach((opt,i)=>{const btn=document.createElement(‘button’);btn.className=‘quiz-option’;btn.textContent=opt;btn.onclick=()=>selectQuizOption(i);c.appendChild(btn)})}
function selectQuizOption(i){if(quizSelected)return;quizSelected=true;const q=quizQuestions[quizIdx];const btns=document.querySelectorAll(’.quiz-option’);if(q.correctIdx>=0)btns[q.correctIdx].classList.add(‘correct’);if(i!==q.correctIdx)btns[i].classList.add(‘wrong’);else quizScore++;btns.forEach(b=>b.disabled=true);quizTimer=setTimeout(()=>{quizSelected=false;if(quizIdx+1>=quizQuestions.length)showQuizResults();else{quizIdx++;renderQuiz()}},1400)}
function showQuizResults(){document.getElementById(‘quizActive’).classList.add(‘hidden’);document.getElementById(‘quizResults’).classList.remove(‘hidden’);const pct=quizScore/quizQuestions.length;document.getElementById(‘resultsEmoji’).textContent=pct>=0.8?‘🎉’:pct>=0.5?‘📚’:‘💪’;document.getElementById(‘resultsScore’).textContent=`${quizScore} / ${quizQuestions.length}`;document.getElementById(‘resultsMsg’).textContent=pct>=0.8?‘Excellent work!’:pct>=0.5?‘Getting there, keep studying!’:“Keep reviewing — you’ve got this!”}
renderMenu();
</script>
