<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a1a;--surface:rgba(255,255,255,0.02);--border:rgba(255,255,255,0.06);--border-light:rgba(255,255,255,0.1);--text:#e0e0e0;--text-dim:#888;--text-faint:#555;--accent-green:#2ecc71;--accent-red:#e74c3c;--card-bg-1:#16213e;--card-bg-2:#1a1a2e;--card-bg-3:#0f3460;--serif:'Source Serif 4',Georgia,serif;--mono:'JetBrains Mono',monospace}
body{min-height:100vh;background:var(--bg);color:var(--text);font-family:var(--serif);-webkit-font-smoothing:antialiased}
.site-header{padding:32px 24px 24px;border-bottom:1px solid var(--border);background:linear-gradient(180deg,#0f0f24,var(--bg))}
.header-inner{max-width:820px;margin:0 auto;display:flex;justify-content:space-between;align-items:flex-start}
.header-label{font:400 11px/1 var(--mono);letter-spacing:4px;color:var(--text-faint);text-transform:uppercase;margin-bottom:10px}
.header-title{font-size:28px;font-weight:700;color:#f0f0f0;line-height:1.2}
.header-sub{font-size:15px;color:#666;font-style:italic;margin-top:4px}
.header-progress{text-align:center;flex-shrink:0}
.header-progress p{font:400 11px/1 var(--mono);color:var(--text-faint);margin-top:6px}
.progress-ring{transform:rotate(-90deg)}.progress-ring__bg{fill:none;stroke:#1a1a2e;stroke-width:4}.progress-ring__fill{fill:none;stroke-width:4;stroke-linecap:round;transition:stroke-dashoffset 0.5s ease}
main{max-width:820px;margin:0 auto;padding:28px 24px 100px}
.quiz-all-btn{width:100%;padding:18px;border-radius:14px;border:1px solid var(--border-light);background:linear-gradient(135deg,var(--card-bg-1),var(--card-bg-3));color:var(--text);cursor:pointer;font:500 15px/1 var(--mono);letter-spacing:1px;margin-bottom:28px;transition:all 0.3s}
.quiz-all-btn:hover{border-color:rgba(255,255,255,0.2);transform:translateY(-1px)}
.sections-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.section-card{border-radius:14px;border:1px solid var(--border);background:var(--surface);overflow:hidden;transition:all 0.3s}
.section-card:hover{border-color:rgba(255,255,255,0.1)}
.section-top{padding:20px 20px 16px;border-bottom:1px solid rgba(255,255,255,0.04);display:flex;justify-content:space-between;align-items:center}
.section-info{display:flex;align-items:center;gap:12px}
.section-icon{font-size:22px}.section-name{font-size:16px;font-weight:600;color:var(--text)}
.section-meta{font:400 12px/1 var(--mono);color:var(--text-faint);margin-top:4px}
.section-actions{display:flex}
.section-actions button{flex:1;padding:13px;background:none;border:none;cursor:pointer;font:400 13px/1 var(--mono);transition:background 0.2s}
.section-actions button:first-child{border-right:1px solid rgba(255,255,255,0.04)}
.section-actions button:hover{background:rgba(255,255,255,0.03)}
.back-btn{background:none;border:none;color:var(--text-dim);cursor:pointer;font:400 13px/1 var(--mono);padding:4px 0}.back-btn:hover{color:var(--text)}
.card-viewport{perspective:1200px;width:100%;max-width:660px}
.card-flipper{position:relative;width:100%;height:420px;transform-style:preserve-3d;transition:transform 0.5s cubic-bezier(.4,.2,.2,1);cursor:pointer}
.card-flipper.flipped{transform:rotateY(180deg)}
.card-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:16px;padding:36px 32px;display:flex;flex-direction:column;justify-content:center;box-shadow:0 8px 32px rgba(0,0,0,0.3)}
.card-front{background:linear-gradient(145deg,var(--card-bg-1),var(--card-bg-2));border:1px solid rgba(255,255,255,0.08)}
.card-back{background:linear-gradient(145deg,var(--card-bg-2),var(--card-bg-3));border:1px solid var(--border-light);transform:rotateY(180deg);overflow-y:auto;justify-content:flex-start;padding-top:32px}
.card-label{font:400 11px/1 var(--mono);letter-spacing:3px;color:#666;text-transform:uppercase;margin-bottom:16px}
.card-counter{position:absolute;top:16px;right:20px;font:400 13px/1 var(--mono);color:var(--text-faint)}
.card-question{font-size:19px;line-height:1.6;color:var(--text)}
.card-answer{font-size:16px;line-height:1.7;color:#c8d6e5;white-space:pre-line}
.card-hint{position:absolute;bottom:16px;left:32px;font:400 12px/1 var(--mono);color:#444}
.card-buttons{display:flex;gap:12px;justify-content:center;margin-top:20px}
.card-btn{padding:10px 28px;border-radius:10px;font:400 14px/1 var(--mono);cursor:pointer;transition:all 0.2s}
.card-btn.learning{border:1px solid #e74c3c44;background:#e74c3c22;color:var(--accent-red)}.card-btn.learning:hover{background:#e74c3c33}
.card-btn.known{border:1px solid #2ecc7144;background:#2ecc7122;color:var(--accent-green)}.card-btn.known:hover{background:#2ecc7133}
.quiz-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
.quiz-counter{color:var(--text-faint);font:400 13px/1 var(--mono)}
.quiz-question{font-size:20px;line-height:1.6;color:var(--text);margin-bottom:28px}
.quiz-options{display:flex;flex-direction:column;gap:10px}
.quiz-option{padding:16px 20px;border-radius:12px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.03);color:#c8d6e5;text-align:left;cursor:pointer;font:400 15px/1.5 var(--serif);transition:all 0.3s}
.quiz-option:hover:not(:disabled){border-color:rgba(255,255,255,0.15);background:rgba(255,255,255,0.05)}
.quiz-option:disabled{cursor:default}
.quiz-option.correct{background:#2ecc7122;border-color:#2ecc7155}
.quiz-option.wrong{background:#e74c3c22;border-color:#e74c3c55}
.results{text-align:center;padding:40px 0}
.results-emoji{font-size:64px;margin-bottom:16px}
.results-score{font-size:28px;font-weight:600;color:var(--text);margin-bottom:8px}
.results-msg{color:var(--text-dim);font:400 14px/1 var(--mono);margin-bottom:32px}
.results-btn{padding:12px 32px;border-radius:10px;border:1px solid rgba(255,255,255,0.15);background:transparent;color:var(--text);cursor:pointer;font:400 14px/1 var(--mono);transition:all 0.2s}
.results-btn:hover{background:rgba(255,255,255,0.05)}
.hidden{display:none!important}
@media(max-width:600px){.header-title{font-size:22px}.card-face{padding:28px 22px}.card-question{font-size:17px}.card-answer{font-size:15px}.sections-grid{grid-template-columns:1fr}}

<script>
const SECTIONS=[{id:"intro",title:"Introduction",icon:"👁",color:"#E8453C",cards:[{q:"What is the difference between 'looking' and 'seeing' according to Sturken and Cartwright?",a:"According to Practices of Looking by Sturken & Cartwright:\n\n\"Seeing\" is a largely automatic sensory process.\n\n\"Looking\" is a conscious, culturally learned practice of making meaning. Looking is treated as a social practice.\n\nThe term \"visuality\" is used to name historically specific ways of organizing vision.\n\nThe professor also referenced Memo Akten's work: \"We see things not as they are, but as we are\" — we filter the world through what we already know."},{q:"Define the term 'affordance' as it relates to digital media.",a:"Psychologist James J. Gibson (1904–1979) coined the word \"affordance\" to describe the \"actionable possibilities\" in an environment — the environment providing the opportunity for action.\n\nAffordances depend upon the relationship between the environment and the human.\n\nWe are constantly expanding the affordances of digital environments and tools. Prof. Demirjian: \"Think about how you can take advantage of the affordances of digital media to extend your creative vision.\""},{q:"What is meant by the term 'speculative fictions'?",a:"Two definitions from the lecture:\n\n1. \"A fuzzy super-set category that houses all non-mimetic genres — genres that depart from imitating conscious reality. These genres construct models of reality rather than transcribe it directly and can be understood as a thought experiment that embraces an open-ended vision of the real.\" — Marek Oziewicz\n\n2. \"Speculative futures are design approaches that help us visualize new and potential worlds, moving us beyond what currently exists into what could one day be.\" — Johanna Hoffman\n\nAlso: \"Speculation is a form of resistance, an act of hope, and an appeal to all that has been left out of the record.\" — Carlota Ortiz Monasterio"},{q:"How does Nora Al-Badri use speculative fictions in her work?",a:"Nora Al-Badri's The Post-Truth Museum (2021–2023) uses speculative fiction to question ownership and access to cultural heritage and museum artifacts.\n\nHer work interrogates the museum as a process and as an interrogative project, challenging who controls historical artifacts. She uses AI and digital technologies to reanimate masks and artifacts, questioning truth and representation in museum contexts."},{q:"How does Cannupa Hanska Luger use speculative fictions?",a:"Luger creates speculative fiction installations like We Survive You (2021) and Midéegaadi (Times Square, 2025).\n\nWe Survive You presents an undetermined future where a small family sets up camp. Features a Repurposed Archaic Technology vehicle (RAT Rod) powered by photosynthesis and a Transportable Intergenerational Protection Infrastructure (TIPI).\n\nThrough this science-fiction motivated installation, Luger challenges our collective thinking, imagining a post-capitalism, post-colonial future where humans restore their bonds with the earth and each other.\n\nProf. Demirjian: Artists and media makers \"prototype new possibilities that lay the pathway for how to be in the world. We are critical world builders.\""}]},{id:"photography",title:"Photography",icon:"📷",color:"#2D7DD2",cards:[{q:"What is a camera obscura and how does it relate to a digital camera?",a:"A camera obscura is a darkened room or box with a small hole that projects an inverted image onto the opposite wall. The class discussed Abelardo Morell's photographs made inside camera obscuras.\n\nThe Sony Alpha 3000 used in class is a mirrorless camera using a live view of the camera sensor, but the concept of focal length is the same — light enters through a lens and hits a sensor to record an image."},{q:"Explain focal length.",a:"\"Focal length, usually represented in millimeters (mm), is the basic description of a photographic lens. It is a calculation of an optical distance from the point where light rays converge to form a sharp image to the digital sensor at the focal plane.\" — Nikon\n\nThe focal length tells us the angle of view (how much is captured) and magnification (how large elements will be).\n\nLonger focal length = narrower angle, higher magnification.\nShorter focal length = wider angle, lower magnification.\n\nA prime lens has one set focal length. A zoom lens goes between focal lengths (like 40–100mm)."},{q:"Telephoto vs. wide-angle lens — what's the impact on the photo?",a:"Telephoto: Magnifies distant subjects, compresses depth (objects appear closer together), narrows field of view. The lecture discussed how lens selection functions thematically in The Graduate.\n\nWide-angle: Captures broad field of view, exaggerates distance between near/far objects. Gary Winogrand shot with a Leica M4 and 28mm wide-angle to capture the energy of street scenes."},{q:"Explain aperture, f-stop, and depth of field.",a:"Aperture controls how much light enters through the lens iris, measured in f-stops.\n\nLarge aperture (small f-number like f/2): Shallow depth of field, less light needed.\nSmall aperture (large f-number like f/16): Increased depth of field, more light needed.\n\nDepth of Field = area in which objects are in focus.\n• Deep DOF: small aperture like f/16 — f.64 group preferred sharp focus foreground to background.\n• Shallow DOF: open aperture like f/2 — camera close to subject with open aperture."},{q:"What is the difference between f/2, f/8, and f/16?",a:"f/2 = wide/open aperture — lots of light, very shallow depth of field.\nf/8 = moderate — good balance, often the 'sweet spot.'\nf/16 = small/closed — less light, deep depth of field.\n\nThe f.64 group was named after the smallest aperture (f/64) because they valued maximum depth of field and sharp focus throughout."},{q:"Explain shutter speed.",a:"Shutter speed controls the duration of time the sensor is exposed to light.\n\nFast (1/320): Freezes a fraction of a second.\nSlow (15 seconds): Creates effects like light streaking (lecture example: ISO 100, f/22, 15-second exposure).\n\nFor time-lapse: set a long shutter or take pictures at intervals (e.g., one per minute over hours)."},{q:"What is ISO?",a:"ISO measures the camera sensor's sensitivity to light. In modern cameras like the Sony Alpha 3000, film sensitivity is simulated digitally.\n\nHigher ISO = more sensitive, higher contrast, but may introduce visual grain.\nLower ISO = less sensitive, cleaner image.\n\nISO stands for International Organization for Standardization."},{q:"What is the difference between 72 dpi/ppi and 300 dpi/ppi?",a:"Resolution = density of pixels. DPI = dots per inch (print). PPI = pixels per inch (screen).\n\n72 ppi = screens/web. 300 ppi = print.\n\nBy shooting Camera Raw, you can output either. When converting 72→300 ppi, you shrink dimensions — do NOT click resample.\n\nKey rule: You can always start high and move down, but can't start low and increase without shrinking or losing quality. When you upsample you lose quality; sampling down is fine."},{q:"Explain the Rule of Thirds.",a:"Divide the frame into a 3×3 grid. Place key elements along grid lines or at intersections for more dynamic compositions than centering.\n\nMultiple examples shown in lecture applied to photography."},{q:"Explain the Golden Section Rectangle.",a:"The Golden Section Rectangle has a proportion of 1:1.618.\n\nExperiment with placing focal points at key intersections (E1, E2, E3, E4 in the slides).\n\nHenri Cartier-Bresson's photographs were shown as examples of Golden Section composition."},{q:"What is a RAW file and how is JPEG different?",a:"RAW types: DNG (Nikon/Samsung), CR2 (Canon). Uncompressed, all sensor data preserved. Maximum editing flexibility.\n\nJPEG: Lossy compression — data permanently lost. Smaller file, ready to share.\n\nTIFF: Uncompressed (lossless) — standard for commercial printing. Excellent for archiving.\n\nKey: Lossy (JPEG) permanently loses data. Lossless (TIFF, PNG) preserves exact original."},{q:"Compare Pictorialism, f.64 Group, and NYC Street Photographers.",a:"Pictorialism (c.1885–1915): Soft focus, atmosphere, like impressionist painting. Conveying emotional states. Legitimizing photography as art. Used slightly out-of-focus lenses, gum bichromate, platinum prints. Stieglitz: \"Atmosphere softens all lines.\" Artists: Stieglitz, Steichen, Seeley.\n\nf.64 Group (1930s): Sharp focus foreground to background. Named after smallest aperture for max DOF. Shifted away from Pictorialism. Artists: Edward Weston, Sonya Noskowiak.\n\nNYC Street (mid-20th c.): Candid, spontaneous urban life. Winogrand's photos are \"tilted, skewed, unsteady\" (Geoff Dyer). Wide-angle lenses (Winogrand: Leica M4, 28mm). Artists: Winogrand, Lisette Model, Jamel Shabazz, Joel Meyerowitz."}]},{id:"collage",title:"Collage & Photomontage",icon:"✂️",color:"#9B59B6",cards:[{q:"What 19th century techniques are precursors to photomontage?",a:"1. Combination Printing: Image from two or more negatives. Henry Peach Robinson: When the Days Work is Done (1877), Fading Away (1877).\n\n2. Double Exposure: Releasing shutter, then without advancing film, releasing again on same paper. Spirit Photography used this for 'ghost' portraits.\n\n3. Dodging: Decrease exposure → areas appear lighter.\n   Burning: Increase exposure → areas appear darker.\n\n4. Masking: Hide portions of a layer, reveal layers below. Black reveals, white conceals."},{q:"What is a photomontage?",a:"Two definitions from lecture:\n\n1. Joining multiple negatives and images into a composite and photographing the results.\n\n2. \"A photomontage is a collage constructed from photographs.\" — Tate Museum"},{q:"Compare Berlin Dadaists (Höch, Heartfield) vs. Russian Constructivists (Rodchenko, Klutsis).",a:"Berlin Dadaists: Post-WWI rage and disillusionment. \"Our rage had to find expression\" — Max Ernst.\n\nHöch: Worked at Ullstein Press, appropriated mass culture images of women to comment on distance between media representation and reality. Critical of marriage. \"I use [the photograph] like color, or as the poet uses the word.\"\n\nHeartfield: \"Use Photography as a Weapon.\" Anti-Nazi satire: Adolf Superman (1932), The Meaning of the Hitler Salute, Hurray the Butter is All Gone.\n\nRussian Constructivists: \"By clipping illustrations and reassembling them, they created a lively alternative to painting\" — MoMA. Industrial inspiration, new materials. Art should have social utility promoting communism. Agitprop = agitation + propaganda.\n\nKey difference: Dadaists used photomontage to undermine/criticize government; Constructivists used it to promote state ideology."},{q:"What is a blending mode and why use them?",a:"Blending modes (or composite modes) are applied to the top layer of the stack. They give the appearance that background and foreground are working together — you pick up the texture of the background.\n\nLuminance = black to white grayscale range.\nChrominance = color."},{q:"Describe Multiply, Screen, and Overlay blending modes.",a:"Screen: Combines based on lightest values. Whichever pixel is lighter shines through. Result always lighter.\n\nMultiply: Combines based on darkest values. Whichever pixel is darkest shines through. Result always darker.\n\nOverlay: Combines both lightest and darkest. Creates higher contrast. Pushes midtones darker than 50% darker, lighter than 50% lighter."},{q:"Masks vs. deleting — what's the advantage?",a:"Masks hide portions of a layer and reveal layers below. Use grayscale on the mask: black reveals below, white conceals.\n\nMasks are non-destructive — editable, refinable, reversible. Deleting is destructive and permanent.\n\nMasking is a valuable compositing technique for combining photos or removing objects."},{q:"Compare Pelle Cass and Martha Rosler's photomontage.",a:"Pelle Cass (Crowded Fields, 2017): \"Still photo time lapse\" — photographs a scene over time, composites all figures into one dense image. Accumulation and energy of everyday spaces.\n\nMartha Rosler (Bringing the War Home, 1967–72; Photo Op, 2008): Juxtaposes domestic interiors with war images. \"I want to explore the relationships between individual consciousness, family life, and the culture of monopoly capitalism.\"\n\nCampany: \"Photography has been the most obvious medium through which high art has entered into dialogues with mass culture.\""},{q:"How do Chris Burnett and Joshua Citarella comment on contemporary times?",a:"Burnett: Photomontages for New York Times Magazine and ads (Quibi). Editorial and commercial digital compositing.\n\nCitarella: \"Life-size photographic tableaux composed of hundreds of individual images through painstaking digital layering. This body of work explores our current political landscape; a period of collapsing empire and withering state power, brought about by the rampant privatization of social life.\"\n\nChristiane Paul: \"Digital technologies add an extra dimension... Digital collages constitute a shift from the affirmation of boundaries to their erasure.\""}]},{id:"design1",title:"Design Principles Pt. 1",icon:"△",color:"#27AE60",cards:[{q:"Define vector graphics vs. bitmap (raster) graphics.",a:"Raster graphics: Grids of pixels. File formats: JPEG, GIF, TIFF, PNG. Lose quality when enlarged.\n\nScalable Vector Graphics (SVG): Mathematical paths/points. Scale infinitely without quality loss. Best for logos, icons, illustrations."},{q:"What are the four primary principles of graphic design?",a:"1. Unity — Establish comprehension through formal arrangement of all parts.\n2. Proportion — Outer proportions in relation to internal divisions; size relationships establishing underlying structure.\n3. Hierarchy — Use of dominance to establish order.\n4. Variety — Create visual interest through managing contrast.\n\n\"Variety is a visual principle that provides the eye with a noticeable difference between two things.\" — Richard Poulin"},{q:"What are the supporting design principles?",a:"Scale — Size relationship from one element to another.\nBalance — Visual distribution, symmetric or asymmetric.\nRhythm — Alternating between shape and space.\nRepetition — Pattern of movement.\nEconomy — Restraint for harmony.\nProximity — Position and spacing between elements."},{q:"Explain Gestalt principles of Proximity and Closure.",a:"Proximity — We perceive close objects/elements as a related group.\n\nClosure — Where image information may not all be present, our eyes complete the shape for us."},{q:"Explain symmetry, approximate symmetry, and asymmetrical balance.",a:"Symmetry: Mirror image on either side of an axial line; elements correspond in size, shape, placement. Examples: Taj Mahal, Wes Anderson films.\n\nApproximate symmetry (relieved symmetry): Slight differences between axial areas. Example: Luo Brothers.\n\nAsymmetrical balance: Sides don't correspond in size/shape/placement. Example: Klimt's Death and Life."},{q:"What are the precepts of asymmetrical balance?",a:"A precept is a rule prescribing a course of action.\n\n• Large form is visually heavier than small\n• Dark value form heavier than light of same size\n• Textured form heavier than smooth of same size\n• Complex form heavier than simple of same size\n• Two+ small forms can balance a large one\n• Smaller dark form can balance larger light one"},{q:"What does 'quality of a line' refer to?",a:"A line is the moving path of a point. The path determines its quality and character.\n\nLine quality is also determined by the tool — charcoal's sketch quality, digital pen precision, brushed ink's organic quality.\n\nConsider: tone/emotion, direction, tool, straight/curved/thick/thin, quality (jagged/smooth/erratic), line as edge of a shape."},{q:"Visual implications of horizontal, vertical, and diagonal lines.",a:"Vertical: Assertive, denote growth and strength. (Joseph Stella, Smokestacks)\n\nDiagonal: Most dramatic — imply action and movement.\n\nHorizontal: Create calm. (Richard Orient, Atlantic Ocean Spring)\n\nCurved lines also suggest movement."},{q:"Compare Art Nouveau and 1960s Psychedelic poster art.",a:"Art Nouveau: Feminine figures, organic/plant motifs, flat, fluid curving lines ('The Whiplash' — ornamental S-curve), abstract forms, decorative patterns. Artists: Behrens, Mucha.\n\nPsychedelic posters were influenced by Art Nouveau but:\n• Higher contrast, more intensely saturated colors (vs. Art Nouveau pastels)\n• Distorted lettering, often hard to read\n• Tried to emulate the visual experience of an LSD trip\n• Vibrating visual environments\n\nBoth share: flowing lines, feminine figure, edge-to-edge detailed illustration."}]},{id:"design2",title:"Design Principles Pt. 2",icon:"◻",color:"#F39C12",cards:[{q:"Geometric vs. organic shapes.",a:"Geometric: Primitives — circles, squares, triangles. Regular, mathematical. Example: Augusto Herbin.\n\nOrganic (biomorphic): Irregular, freeform, natural. Example: Michael Kennan.\n\nWe see convex shapes (bulging outward) as figure and concave (sloping inward) as ground."},{q:"What is Shape vs. Form?",a:"Shape is a two-dimensional character.\n\nForm is perceived as three-dimensional (also called mass or volume) — it has height, width, and depth."},{q:"What are characteristics of Plakatstil designs?",a:"Plakatstil = German for 'poster style.' Original flat graphic style for advertising.\n\n• Bold, flat colors\n• Simplified, reduced imagery\n• Minimal color palette\n• Extreme contrast between shapes, values, intensity\n• The opposite of decoration\n• Bold and powerful message\n\nKey artist: Lucien Bernhard (1906–1914). Also: Niklaus Stoecklin."},{q:"Explain negative/positive space and integrated space.",a:"Positive space: Area occupied by main subjects/elements.\nNegative space: 'Empty' space around subjects.\n\nIntegrated: Both negative and positive space actively contribute to meaning. Examples: Picasso's Harlequin (1915), Multicanal logo, Kitagawa Utamaro prints."},{q:"Significance of the poster in visual communication.",a:"Bridging art and advertising. Lithography (1798) enabled mass color production. Artists like Chéret, Toulouse-Lautrec, Mucha elevated posters to art.\n\nPosters were integral to: urban culture, events, advertising, entertainment. Part of the democratization of art.\n\nPuerto Rican poster culture: Lorenzo Homar, Division of Community Education, Taller Alacran (Antonio Martorelli)."},{q:"Define typography. Describe kerning, tracking, and leading.",a:"Typography: \"The style, arrangement, or appearance of typeset matter.\" — Poulin. To design with type — considering typeface, size, alignment, color, spacing. Both communicative and visual.\n\nKerning: Space between individual letter forms. A kern was a small metal piece projecting over the letter's body edge.\n\nTracking: Consistent increase/decrease of space across a range of characters. Affects the whole line.\n\nLeading: Vertical space between baselines of successive lines. Named after lead strips in hand-typesetting."},{q:"Type classifications (serif, sans-serif, etc.).",a:"Serif: Small strokes at letter ends. Classic, traditional.\nSans-serif: No serifs — clean, modern. Favored by Modernists.\nDecorative/Display: Highly stylized, for headlines.\nScript: Mimics handwriting/calligraphy.\nMonospaced: Equal character width.\n\nBe prepared to visually identify these on the exam."},{q:"Compare Modernism and Post-Modernism in design.",a:"Modernism (International Style, peak 1920s–60s):\n• Grid structures, asymmetrical layout, sans-serif type\n• No decoration/illustration, consistency, clarity\n• \"Less is More\" — Mies van der Rohe\n• Form follows function\n• Key: Tschichold, Bauhaus, Le Corbusier, Seagram Building\n\nPost-Modernism:\n• Reaction against Modernism's 'universal' language\n• Pastiche, retro/techno motifs, disregard for grid\n• \"Form follows style, not function\" — Drucker & McVarish\n• Bright colors, no grid, irony, appropriation\n• Key: April Greiman, David Carson, Paula Scher, Weingart, Sagmeister\n\n\"Modernism rejects tradition; Post-Modernism re-engages with history through parody or irony.\""},{q:"What is the principle of Economy in design?",a:"A minimal amount of elements orchestrated to create harmony and unity. Good design achieved with restricted elements. \"Less is more\" is the mantra.\n\nExample from lecture: Just one shape (rectangle) and three colors create a powerful sense of order through clever arrangement, rhythm, grid structure, and negative space."}]},{id:"color",title:"Color",icon:"🎨",color:"#E74C8B",cards:[{q:"Additive vs. subtractive color, RGB vs. CMYK.",a:"Additive: Color from light. Examples: monitors, light bulbs, sunlight. Use RGB for screen-based work.\n\nSubtractive: Pigments combine. Examples: paints, inks. Use CMYK for print-based work."},{q:"Define Hue, Saturation, and Value.",a:"Hue: Name of the color (range 0–360).\n\nValue: Relative lightness or darkness. White added = tint. Black added = shade.\n\nSaturation: Relative purity/intensity (range 0–100). Desaturated = muted, dull. Saturated = lively, vivid.\n\n\"Saturated colors attract attention. Desaturated light colors = friendly; desaturated dark = formal; saturated = exciting and dynamic.\" — Poulin"},{q:"Warm vs. cool colors.",a:"Warm: Associated with sun, heat, fire. Tend to advance visually.\n\nCool: Associated with sky, water, shade. Tend to recede.\n\nDesigners use these perceptual properties to create depth."},{q:"Describe the main color schemes.",a:"Monochromatic: Variations of value/saturation, same hue.\n\nAnalogous: Adjacent hues on the color wheel.\n\nComplementary: Directly opposite on the wheel.\n\nSplit Complementary: Opposite + adjacent color(s).\n\nTriadic: Three equidistant on the wheel. Example: Mondrian's Trafalgar Square."},{q:"How do you read hexadecimal color codes?",a:"Hex codes represent RGB in pairs: #RRGGBB.\nExample: #d18bd0 → d1=red, 8b=green, d0=blue.\n\nCalculate: first digit × 16 + second digit.\nFF = 15×16+15 = 255.\n\nThe first digit carries most weight:\n• ff0000 or e3271d → primarily red.\n\nFor the exam: roughly identify a color from its hex code."},{q:"How does adjacent color affect perception? (Albers)",a:"Our perception of a color depends on adjacent colors. Josef Albers showed that \"the true color of the two central squares becomes unrecognizable, as it loses its identity.\"\n\nThe same color looks different depending on surrounding colors — this is our daily experience, not just a trick."},{q:"How is color culturally specific?",a:"Royalty: Purple (Western/Egyptian), Yellow (China), Red (Rome).\nMourning: White (India), Violet (Turkey), Brown (Ethiopia), Yellow (Burma).\nBridal: Red (China), Yellow (Hindu India).\n\nColor-emotion connections: green=envy, blue=sadness, red=anger."}]},{id:"photoshop",title:"Photoshop",icon:"🖌",color:"#31A2F2",cards:[{q:"Describe the selection tools and their differences.",a:"Marquee: Geometric selections (rectangle/ellipse).\nMagic Wand: Selects similar-color areas. Adjustable tolerance.\nMagnetic Lasso: Snaps to edges of contrast.\nLasso: Freehand drawn. Maximum control.\nQuick Selection: Paint and Photoshop auto-detects edges. Fast and intelligent."},{q:"Scale and rotate from center in Photoshop.",a:"Free Transform (Ctrl/Cmd + T).\nScale from center: Hold Alt/Option + drag corner.\nRotate: Cursor outside bounding box → curved arrow → drag.\nProportional from center: Shift + Alt/Option."},{q:".psd file vs. .jpg — what's the difference?",a:".PSD: Photoshop's native format. Preserves all layers, masks, effects. Large, fully re-editable. Not for web.\n\n.JPG: Flattened, lossy compression. Layers merged, data permanently lost. Small, universally viewable. Can't un-flatten."},{q:"What is image resolution and why does it matter?",a:"Resolution = density of pixels. DPI (print), PPI (screen).\n72 ppi = screens. 300 dpi = print.\n\nAccessed via Image Tab → Image Size. When converting 72→300, do NOT resample.\n\nUpsample = lose quality. Downsample = fine.\nAlways create at highest resolution first."}]},{id:"web",title:"Web / HTML",icon:"</>",color:"#E67E22",cards:[{q:"Describe the <p> tag.",a:"Defines a paragraph. Block of text with automatic spacing above/below. Standard body text tag. Used in HW#1 for creative statements."},{q:"Describe the <a href> tag.",a:"Creates a hyperlink. 'href' specifies the destination URL.\nUsed in class to link pages together.\nExample: <a href=\"https://example.com\">Click here</a>"},{q:"Describe the <img src> tag.",a:"Embeds an image. 'src' specifies image path/URL. Self-closing.\nInclude 'alt' for accessibility.\nExample: <img src=\"photo.jpg\" alt=\"description\">"},{q:"Describe the <h1> tag.",a:"Most important heading. HTML has <h1> (largest) through <h6> (smallest). Used in HW#1 for your name on the index page."},{q:"Describe the <br> tag.",a:"Inserts a line break — next line without new paragraph. Self-closing. Use for meaningful breaks (addresses, poetry), not spacing (use CSS)."}]}];
let known={},currentSection=null,shuffledCards=[],cardIdx=0,flipped=false,quizQuestions=[],quizIdx=0,quizScore=0,quizSelected=false,quizTimer=null;
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}
function totalCards(){return SECTIONS.reduce((a,s)=>a+s.cards.length,0)}
function totalKnown(){return Object.keys(known).length}
function setRing(el,pct,c){el.setAttribute('stroke-dashoffset',c*(1-pct))}
function updateGlobal(){const tc=totalCards(),tk=totalKnown();document.getElementById('globalCount').textContent=`${tk}/${tc}`;setRing(document.getElementById('globalRing'),tc>0?tk/tc:0,131.95)}
function show(id){['menuView','cardView','quizView'].forEach(v=>document.getElementById(v).classList.toggle('hidden',v!==id))}
function renderMenu(){const grid=document.getElementById('sectionsGrid');grid.innerHTML='';SECTIONS.forEach(sec=>{const sk=sec.cards.filter(c=>known[c.q]).length;const pct=sk/sec.cards.length;const r=14,circ=2*Math.PI*r;grid.innerHTML+=`<div class="section-card"><div class="section-top"><div class="section-info"><span class="section-icon">${sec.icon}</span><div><div class="section-name">${sec.title}</div><div class="section-meta">${sec.cards.length} cards · ${sk} mastered</div></div></div><svg class="progress-ring" width="36" height="36"><circle class="progress-ring__bg" cx="18" cy="18" r="${r}"/><circle class="progress-ring__fill" cx="18" cy="18" r="${r}" stroke="${sec.color}" stroke-dasharray="${circ}" stroke-dashoffset="${circ*(1-pct)}"/></svg></div><div class="section-actions"><button style="color:${sec.color}" onclick="startCards('${sec.id}')">Flashcards</button><button style="color:${sec.color}" onclick="startQuiz('${sec.id}')">Quiz</button></div></div>`});updateGlobal()}
function goMenu(){clearTimeout(quizTimer);quizSelected=false;show('menuView');renderMenu()}
function startCards(secId){currentSection=SECTIONS.find(s=>s.id===secId);shuffledCards=shuffle(currentSection.cards);cardIdx=0;flipped=false;show('cardView');document.getElementById('cardSectionLabel').textContent=`${currentSection.icon} ${currentSection.title}`;renderCard()}
function renderCard(){const card=shuffledCards[cardIdx];document.getElementById('cardQuestion').textContent=card.q;document.getElementById('cardAnswer').textContent=card.a;document.getElementById('cardCounter').textContent=`${cardIdx+1}/${shuffledCards.length}`;document.getElementById('cardFlipper').classList.toggle('flipped',flipped);document.getElementById('cardButtons').classList.toggle('hidden',!flipped)}
function flipCard(){flipped=!flipped;renderCard()}
function markCard(gotIt){const card=shuffledCards[cardIdx];if(gotIt)known[card.q]=true;else delete known[card.q];flipped=false;if(cardIdx+1<shuffledCards.length){cardIdx++;setTimeout(renderCard,150)}else setTimeout(goMenu,200)}
function getShortAnswer(a){const lines=a.split('\n').filter(l=>l.trim().length>0);let best=lines[0]||a;if(best.length>160){const idx=best.indexOf('.',40);if(idx>0&&idx<160)best=best.substring(0,idx+1);else best=best.substring(0,157)+'...'}return best}
function startQuiz(secId){const sec=secId?SECTIONS.find(s=>s.id===secId):null;const pool=sec?sec.cards:SECTIONS.flatMap(s=>s.cards);const picked=shuffle(pool).slice(0,Math.min(10,pool.length));quizQuestions=picked.map(card=>{const correct=getShortAnswer(card.a);const wrongPool=pool.filter(c=>c.q!==card.q);const wrongs=shuffle(wrongPool).slice(0,3).map(c=>getShortAnswer(c.a));const allOpts=[correct,...wrongs];const uniqueOpts=[...new Set(allOpts)];while(uniqueOpts.length<4){const extra=shuffle(wrongPool).find(c=>!uniqueOpts.includes(getShortAnswer(c.a)));if(extra)uniqueOpts.push(getShortAnswer(extra.a));else break}const options=shuffle(uniqueOpts);return{q:card.q,options,correctIdx:options.indexOf(correct)}});quizIdx=0;quizScore=0;quizSelected=false;show('quizView');document.getElementById('quizActive').classList.remove('hidden');document.getElementById('quizResults').classList.add('hidden');renderQuiz()}
function renderQuiz(){const q=quizQuestions[quizIdx];document.getElementById('quizCounter').textContent=`${quizIdx+1}/${quizQuestions.length}`;document.getElementById('quizQuestion').textContent=q.q;const c=document.getElementById('quizOptions');c.innerHTML='';q.options.forEach((opt,i)=>{const btn=document.createElement('button');btn.className='quiz-option';btn.textContent=opt;btn.onclick=()=>selectQuizOption(i);c.appendChild(btn)})}
function selectQuizOption(i){if(quizSelected)return;quizSelected=true;const q=quizQuestions[quizIdx];const btns=document.querySelectorAll('.quiz-option');if(q.correctIdx>=0)btns[q.correctIdx].classList.add('correct');if(i!==q.correctIdx)btns[i].classList.add('wrong');else quizScore++;btns.forEach(b=>b.disabled=true);quizTimer=setTimeout(()=>{quizSelected=false;if(quizIdx+1>=quizQuestions.length)showQuizResults();else{quizIdx++;renderQuiz()}},1200)}
function showQuizResults(){document.getElementById('quizActive').classList.add('hidden');document.getElementById('quizResults').classList.remove('hidden');const pct=quizScore/quizQuestions.length;document.getElementById('resultsEmoji').textContent=pct>=0.8?'🎉':pct>=0.5?'📚':'💪';document.getElementById('resultsScore').textContent=`${quizScore} / ${quizQuestions.length}`;document.getElementById('resultsMsg').textContent=pct>=0.8?'Excellent work!':pct>=0.5?'Getting there, keep studying!':"Keep reviewing — you've got this!"}
renderMenu();
</script>
</body>
